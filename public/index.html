<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>MedControl</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>💊 MedControl</h1>

    <form id="medForm">
        <input type="text" id="nome" placeholder="Nome" required>
        <input type="text" id="dosagem" placeholder="Dosagem" required>
        <input type="text" id="horario" placeholder="Horário" required>
        <input type="text" id="observacoes" placeholder="Observações">

        <button type="submit">Salvar</button>
    </form>

    <h2>Medicamentos cadastrados</h2>

    <ul id="listaMedicamentos"></ul>

    <script src="script.js"></script>

</body>
</html>
